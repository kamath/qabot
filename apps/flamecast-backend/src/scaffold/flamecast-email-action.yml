name: "Flamecast Email"
description: "Send an email notification via Flamecast backend"

inputs:
  subject:
    description: "Email subject line"
    required: false
    default: "Flamecast Run Report"
  text:
    description: "Email body text"
    required: true
  filepaths:
    description: "Newline-separated list of file paths to attach (relative to repo root)"
    required: false
    default: ""
  flamecast_api_key:
    description: "Flamecast API key"
    required: true

runs:
  using: "composite"
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    - name: Install script dependencies
      shell: bash
      run: cd ${{ github.workspace }}/.github/scripts && bun install
    - name: Send email
      shell: bash
      env:
        INPUT_SUBJECT: ${{ inputs.subject }}
        INPUT_TEXT: ${{ inputs.text }}
        INPUT_FILEPATHS: ${{ inputs.filepaths }}
        INPUT_API_KEY: ${{ inputs.flamecast_api_key }}
      run: bun run ${{ github.workspace }}/.github/scripts/send-email.ts
