name: Flamecast

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "JSON-encoded caller payload"
        required: true
        type: string

run-name: "${{ inputs.payload != '' && fromJson(inputs.payload).prompt || format('Flamecast run {0}', github.run_id) }}"

jobs:
  flamecast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install script dependencies
        run: cd .github/scripts && bun install
      - name: Record payload context
        env:
          INPUT_PAYLOAD: ${{ inputs.payload }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: bun run .github/scripts/record-context.ts
      - name: Load run context
        run: |
          RUN_ID="${{ github.run_id }}"
          CONTEXT_DIR="runs/$RUN_ID/context"
          if [ -d "$CONTEXT_DIR" ] && [ "$(ls -A "$CONTEXT_DIR" 2>/dev/null)" ]; then
            mkdir -p ".flamecast/context"
            cp -r "$CONTEXT_DIR/." ".flamecast/context/"
            echo "Loaded context from $CONTEXT_DIR"
          else
            echo "No context directory found"
          fi
      - name: Notify task started
        continue-on-error: true
        env:
          WORKSPACE_ID: ${{ fromJson(inputs.payload).workspace_id }}
          RUN_ID: ${{ github.run_id }}
          LIFECYCLE_EVENT: started
          FLAMECAST_API_URL: ${{ secrets.FLAMECAST_API_URL || 'https://api.flamecast.dev' }}
          FLAMECAST_API_KEY: ${{ secrets.FLAMECAST_API_KEY }}
        run: bun run .github/scripts/notify-lifecycle.ts
      - name: Configure git identity
        id: user
        if: ${{ fromJson(inputs.payload).prompt != null && fromJson(inputs.payload).prompt != '' }}
        env:
          GH_TOKEN: ${{ secrets.FLAMECAST_PAT || github.token }}
        run: |
          USER_ID=$(gh api /users/"$GITHUB_ACTOR" --jq '.id')
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "${USER_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          echo "id=$USER_ID" >> "$GITHUB_OUTPUT"
      - name: Install Smithery CLI
        if: ${{ fromJson(inputs.payload).prompt != null && fromJson(inputs.payload).prompt != '' }}
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          if [ -z "$SMITHERY_API_KEY" ]; then echo "No Smithery API key, skipping"; exit 0; fi
          npm install -g @smithery/cli@latest
      - name: Configure Smithery CLI
        id: settings
        if: ${{ fromJson(inputs.payload).prompt != null && fromJson(inputs.payload).prompt != '' }}
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          if [ -z "$SMITHERY_API_KEY" ]; then echo "json=" >> "$GITHUB_OUTPUT"; exit 0; fi
          SETTINGS=$(jq -nc --arg key "$SMITHERY_API_KEY" '{env: {SMITHERY_API_KEY: $key}}')
          echo "json=$SETTINGS" >> "$GITHUB_OUTPUT"
      - name: Run Claude Code
        id: flamecast
        if: ${{ fromJson(inputs.payload).prompt != null && fromJson(inputs.payload).prompt != '' }}
        uses: anthropics/claude-code-action@main
        with:
          prompt: ${{ fromJson(inputs.payload).prompt }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.FLAMECAST_PAT }}
          base_branch: main
          bot_id: ${{ steps.user.outputs.id }}
          bot_name: ${{ github.actor }}
          show_full_output: "true"
          settings: ${{ steps.settings.outputs.json || '' }}
          claude_args: "--dangerously-skip-permissions"
      - name: Collect user outputs
        if: always()
        run: |
          if [ -d ".flamecast/outputs" ] && [ "$(ls -A .flamecast/outputs 2>/dev/null)" ]; then
            mkdir -p "$RUNNER_TEMP/flamecast/user-outputs"
            cp -r .flamecast/outputs/. "$RUNNER_TEMP/flamecast/user-outputs/"
            echo "Collected $(find "$RUNNER_TEMP/flamecast/user-outputs" -type f | wc -l) user output file(s)"
          else
            echo "No user outputs found in .flamecast/outputs/"
          fi
      - name: Upload user outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flamecast-user-outputs
          path: ${{ runner.temp }}/flamecast/user-outputs/
          retention-days: 1
          if-no-files-found: ignore
      - name: Persist flamecast outputs
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/flamecast"
          cat > "$RUNNER_TEMP/flamecast/outputs.json" <<EOF
          {
            "pr_url": ${{ toJson(steps.flamecast.outputs.pr_url) }},
            "claude_logs": ${{ toJson(steps.flamecast.outputs.claude_logs) }}
          }
          EOF
      - name: Upload flamecast outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flamecast-outputs
          path: ${{ runner.temp }}/flamecast/outputs.json
          retention-days: 1
      - name: Collect step summaries
        if: always()
        run: |
          SUMMARY_DIR=$(dirname "$GITHUB_STEP_SUMMARY")
          find "$SUMMARY_DIR" -name 'step_summary_*' -size +0 -exec cat {} + > "$RUNNER_TEMP/flamecast/summary.md" 2>/dev/null || true
      - name: Upload step summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flamecast-summary
          path: ${{ runner.temp }}/flamecast/summary.md
          retention-days: 1
      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flamecast-execution-log
          path: ${{ runner.temp }}/claude-execution-output.json
          retention-days: 1
          if-no-files-found: ignore
      - name: Notify workflow complete
        if: always()
        continue-on-error: true
        env:
          WORKSPACE_ID: ${{ fromJson(inputs.payload).workspace_id }}
          RUN_ID: ${{ github.run_id }}
          LIFECYCLE_EVENT: workflow_complete
          FLAMECAST_API_URL: ${{ secrets.FLAMECAST_API_URL || 'https://api.flamecast.dev' }}
          FLAMECAST_API_KEY: ${{ secrets.FLAMECAST_API_KEY }}
        run: bun run .github/scripts/notify-lifecycle.ts
