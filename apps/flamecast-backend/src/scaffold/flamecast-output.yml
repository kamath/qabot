name: Flamecast Output

on:
  workflow_run:
    workflows: ["Flamecast"]
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  commit-summary:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install script dependencies
        run: cd .github/scripts && bun install

      - name: Download summary artifact
        id: summary-artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: flamecast-summary
          path: ${{ runner.temp }}/flamecast-summary
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Download user outputs
        id: user-outputs
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: flamecast-user-outputs
          path: ${{ runner.temp }}/flamecast-user-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Download execution log
        id: execution-log
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: flamecast-execution-log
          path: ${{ runner.temp }}/flamecast-execution-log
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Commit outputs
        env:
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: bun run .github/scripts/commit-outputs.ts

      - name: Notify outputs stored
        continue-on-error: true
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          LIFECYCLE_EVENT: outputs_stored
          OUTPUT_FILE: runs/${{ github.event.workflow_run.id }}/outputs/RESULT.md
          FLAMECAST_API_URL: ${{ secrets.FLAMECAST_API_URL || 'https://api.flamecast.dev' }}
          FLAMECAST_API_KEY: ${{ secrets.FLAMECAST_API_KEY }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          WORKSPACE_ID=$(cat "runs/$RUN_ID/context/WORKSPACE_ID.md" 2>/dev/null || echo "")
          export WORKSPACE_ID
          bun run .github/scripts/notify-lifecycle.ts

      - name: Prepare email content
        id: email-content
        env:
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: bun run .github/scripts/prepare-email.ts

      - name: Send email notification
        uses: ./.github/actions/flamecast-email
        with:
          subject: ${{ steps.email-content.outputs.subject }}
          text: ${{ steps.email-content.outputs.body }}
          flamecast_api_key: ${{ secrets.FLAMECAST_API_KEY }}
