# yaml-language-server: $schema=https://app.stainless.com/config.schema.json
edition: 2025-10-10

openapi:
  # Set this to the docs provider format you want.
  # Supported examples: 'readme' | 'redocly' | 'mintlify' | 'bump.sh' | 'gitbook' | 'x-codeSamples' | 'stainless'
  code_samples: 'mintlify'


organization:
  name: smithery
  docs: 'https://flamecast.dev/docs'
  contact: 'contact@flamecast.dev'

targets:
  typescript:
    edition: typescript.2025-10-10
    package_name: '@flamecast/api'
    production_repo: 'smithery-ai/flamecast-typescript'
    publish:
      npm:
        auth_method: oidc

environments:
  production: https://api.flamecast.dev

resources:
  api_keys:
    methods:
      list: get /api-keys
      create: post /api-keys
      delete: delete /api-keys/{id}
  github:
    methods:
      user: get /github/user
  setup:
    methods:
      status: get /setup/status
  workspaces:
    models:
      workspace_item: '#/components/schemas/WorkspaceItem'
      create_workspace_request: '#/components/schemas/CreateWorkspaceRequest'
      list_workspaces_response: '#/components/schemas/ListWorkspacesResponse'
      workspace_error: '#/components/schemas/WorkspaceError'
    methods:
      create: post /workspaces
      list: get /workspaces
      get: get /workspaces/{workspaceId}
      delete: delete /workspaces/{workspaceId}
    subresources:
      default:
        methods:
          get: get /workspaces/default
          set: put /workspaces/default
      sync_workflows:
        methods:
          sync: post /workspaces/{workspaceId}/sync-workflows
      secrets:
        methods:
          set: put /workspaces/{workspaceId}/secrets
          refresh: post /workspaces/{workspaceId}/secrets/refresh
      skills:
        models:
          skill_item: '#/components/schemas/SkillItem'
          add_skill_request: '#/components/schemas/AddSkillRequest'
          add_skill_response: '#/components/schemas/AddSkillResponse'
          list_skills_response: '#/components/schemas/ListSkillsResponse'
          remove_skill_response: '#/components/schemas/RemoveSkillResponse'
          skill_error: '#/components/schemas/SkillError'
        methods:
          add: post /workspaces/{workspaceId}/skills
          list: get /workspaces/{workspaceId}/skills
          remove: delete /workspaces/{workspaceId}/skills/{skill}
      mcp:
        models:
          mcp_connection_item: '#/components/schemas/McpConnectionItem'
          add_mcp_connection_request: '#/components/schemas/AddMcpConnectionRequest'
          add_mcp_connection_response: '#/components/schemas/AddMcpConnectionResponse'
          list_mcp_connections_response: '#/components/schemas/ListMcpConnectionsResponse'
          mcp_session_token_request: '#/components/schemas/McpSessionTokenRequest'
          mcp_session_token_response: '#/components/schemas/McpSessionTokenResponse'
          remove_mcp_connection_response: '#/components/schemas/RemoveMcpConnectionResponse'
          mcp_error: '#/components/schemas/McpError'
        methods:
          add: post /workspaces/{workspaceId}/mcp
          list: get /workspaces/{workspaceId}/mcp
          create_token: post /workspaces/{workspaceId}/mcp/token
          remove: delete /workspaces/{workspaceId}/mcp/{server}
      tasks:
        models:
          task_item: '#/components/schemas/TaskItem'
          task_message: '#/components/schemas/TaskMessage'
          task_detail_response: '#/components/schemas/TaskDetailResponse'
          list_tasks_response: '#/components/schemas/ListTasksResponse'
          create_task_request: '#/components/schemas/CreateTaskRequest'
          update_lifecycle_request: '#/components/schemas/UpdateLifecycleRequest'
          update_lifecycle_response: '#/components/schemas/UpdateLifecycleResponse'
          archive_task_response: '#/components/schemas/ArchiveTaskResponse'
          unarchive_task_response: '#/components/schemas/UnarchiveTaskResponse'
          task_error: '#/components/schemas/TaskError'
        methods:
          create: post /workspaces/{workspaceId}/tasks
          list:
            endpoint: get /workspaces/{workspaceId}/tasks
            pagination: cursor_page
          get: get /workspaces/{workspaceId}/tasks/{taskId}
          archive: post /workspaces/{workspaceId}/tasks/{taskId}/archive
          unarchive: post /workspaces/{workspaceId}/tasks/{taskId}/unarchive
          update_lifecycle: put /workspaces/{workspaceId}/tasks/{taskId}/lifecycle

settings:
  disable_mock_tests: true
  license: Apache-2.0

pagination:
  - name: cursor_page
    type: cursor
    request:
      cursor:
        type: string
      limit:
        type: integer
    response:
      tasks:
        type: array
        items: {}
      hasMore:
        type: boolean
      nextCursor:
        type: string
        nullable: true

client_settings:
  opts:
    api_key:
      type: string
      nullable: false
      auth:
        security_scheme: bearerAuth
      description: Flamecast API key as Bearer token
      read_env: FLAMECAST_API_KEY

readme:
  example_requests:
    default:
      type: request
      endpoint: post /workspaces
      params:
        body:
          name: my-workspace
    headline:
      type: request
      endpoint: post /workspaces/{workspaceId}/tasks
      params:
        body:
          prompt: Fix the login bug
