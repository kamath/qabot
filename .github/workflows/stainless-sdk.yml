name: Build SDKs for pull request

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - 'apps/flamecast-backend/**'
      - 'packages/api-schemas/**'
      - 'packages/auth/**'
      - 'packages/db/**'
      - 'packages/utils/**'

concurrency:
  group: stainless-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  STAINLESS_ORG: smithery
  STAINLESS_PROJECT: flamecast
  OAS_PATH: apps/flamecast-backend/openapi.json

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: pnpm --filter flamecast-backend openapi:generate

      - name: Upload for Stainless preview
        id: preview
        uses: stainless-api/upload-openapi-spec-action/preview@v1
        with:
          org: ${{ env.STAINLESS_ORG }}
          project: ${{ env.STAINLESS_PROJECT }}
          oas_path: ${{ env.OAS_PATH }}
          config_path: apps/flamecast-backend/openapi.stainless.yml

      - name: Update @flamecast/api to preview build
        env:
          STAINLESS_OUTCOMES: ${{ steps.preview.outputs.outcomes }}
        run: |
          INSTALL_URL=$(echo "$STAINLESS_OUTCOMES" | jq -r '.typescript.install_url // empty')
          if [ -z "$INSTALL_URL" ]; then
            echo "No install_url found for TypeScript SDK, skipping update"
            exit 0
          fi
          echo "Updating @flamecast/api to: $INSTALL_URL"

          OLD_PATTERN='https://pkg\.stainless\.com/s/flamecast-typescript/[a-f0-9]\+/dist\.tar\.gz'
          for pkg in packages/cli/package.json; do
            if [ -f "$pkg" ]; then
              sed -i "s|${OLD_PATTERN}|${INSTALL_URL}|g" "$pkg"
            fi
          done

      - name: Install dependencies with updated SDK
        run: pnpm install --no-frozen-lockfile

      - name: Verify SDK compatibility
        run: pnpm check

  merge:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: pnpm --filter flamecast-backend openapi:generate

      - name: Run merge build
        uses: stainless-api/upload-openapi-spec-action/merge@v1
        with:
          org: ${{ env.STAINLESS_ORG }}
          project: ${{ env.STAINLESS_PROJECT }}
          oas_path: ${{ env.OAS_PATH }}
